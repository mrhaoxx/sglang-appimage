name: Build SGLang AppImage

on:
  workflow_dispatch:
    inputs:
      sglang_ref:
        description: "SGLang branch/tag/commit"
        default: "main"
      ktransformers_ref:
        description: "KTransformers branch/tag/commit"
        default: "main"

env:
  IMAGE: sglang-appimage-builder

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift
          sudo docker image prune -af || true
          df -h /

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/cuda-toolkit
            .cache/pip-cache
            .cache/python-appimage
            .cache/runtime-x86_64
            .cache/appimagetool-bin
          key: build-cache-${{ hashFiles('recipe/versions.env') }}
          restore-keys: build-cache-

      - name: Build AppImage
        env:
          SGLANG_REF: ${{ inputs.sglang_ref }}
          KTRANSFORMERS_REF: ${{ inputs.ktransformers_ref }}
        run: |
          # Override versions.env for CI: no proxy, use default PyPI
          export PROXY=""
          export NO_PROXY=""
          export PYPI_INDEX=https://pypi.org/simple
          ./build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SGLang-AppImage
          path: dist/SGLang.AppImage

      - name: Upload to R2
        if: ${{ secrets.R2_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          SGLANG_COMMIT=$(git -C .cache/sglang-src rev-parse --short HEAD)
          KT_COMMIT=$(git -C .cache/ktransformers-src rev-parse --short HEAD)
          DEST="s3://${R2_BUCKET}/sglang-appimage/SGLang-${SGLANG_COMMIT}-kt${KT_COMMIT}-x86_64.AppImage"
          aws s3 cp dist/SGLang.AppImage "$DEST" --endpoint-url "$R2_ENDPOINT_URL"
